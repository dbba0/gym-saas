services:
  db:
    image: postgres:16
    container_name: gym_saas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gym
      POSTGRES_PASSWORD: gym
      POSTGRES_DB: gym_saas
    ports:
      - "5432:5432"
    volumes:
      - gym_saas_db:/var/lib/postgresql/data

volumes:
  gym_saas_db:
